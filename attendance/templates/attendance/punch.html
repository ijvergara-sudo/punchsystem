<!DOCTYPE html>
<html>
<head>
    <title>Welcome to UAGM Preengineering experience</title>
	<style>
	.dynamic {
		field-sizing: content; /* Grow/shrink with content */
		min-width: 200px; /* Prevent too small */
		max-width: 500px; /* Prevent too large */
		font-size: 30px;
		}
	.boton {font-size: 30px;
			width: 150px;
		}
    html * { padding:0; margin:0; }
    body * { padding:10px 20px; }
    body * * { padding:0; }
    body { font-family: sans-serif; background:#FFF; color:#000; }
    body > :where(header, main, footer) { border-bottom:1px solid #ddd; }
    h1 { font-weight:normal; margin-bottom:.4em; }
    h1 small { font-size:60%; color:#666; font-weight:normal; }
    table { border:none; border-collapse: collapse; width:100%; }
    td, th { align:center; vertical-align:top; padding:2px 3px; }
    th { width:12em; text-align:right; color:#666; padding-right:.5em; }
    #info { background:#f6f6f6; }
    #info ol { margin: 0.5em 4em; }
    #info ol li { font-family: monospace; }
    #summary { background: #ff0f0c; }
    #explanation { background:#eee; border-bottom: 0px none; }
    pre.exception_value { font-family: sans-serif; color: #575757; font-size: 1.5em; margin: 10px 0 10px 0; }
  </style>
</head>
<body>






<form method="post">
<table align="center" border=0>
<tr>
<td align="center">
{% if message %}
<h3>{{ message }}</h3>
{% endif %}
<h1>UAGM Preengineering <br> <h1> Attendance Punch</h1>
</td>
</tr>

<tr>
<td>
    {% csrf_token %}

    <input type="text" class= "dynamic" name="username" placeholder="Username" required>
   </td>
   </tr>
   <tr>
   <td>
    <input type="password" class= "dynamic" name="pin" placeholder="PIN" required>
	</td>
	</tr>
	<tr>
	<td>
    <button type="submit" class="boton">Punch</button>
	</td>
	</tr>
	<table>
</form>
<table>

{% if employee_punches %}
    <hr>
    <h2>Recent Punches for {{ employee_name }}</h2>

    <table border="1">
        <tr>
            <th>Type</th>
            <th>Date / Time</th>
        </tr>

        {% for punch in employee_punches %}
        <tr>
            <td>{{ punch.punch_type }}</td>
            <td>{{ punch.timestamp }}</td>
        </tr>
        {% endfor %}
    </table>
{% endif %}

<br>


</body>
</html>
